<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack</title>
<style>
  :root {
    --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
    --text:#f0f0f0;--text2:#c8c8c8;--text3:#999;
    --border:#3a3a3a;--border2:#505050;
    --blue:#5b9cf6;--blue-bg:#1a2d4a;--blue-text:#a8c8ff;
    --green:#4caf7d;--green-bg:#0d2e1c;
    --amber:#f0b429;--amber-bg:#2e2000;
    --red:#f07070;--red-bg:#2e1010;
    --purple:#c084fc;--purple-bg:#2d1a4a;
    --mono:'Consolas','Menlo',monospace;
    --radius:10px;--rsm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh;}

  .topbar{background:var(--bg2);border-bottom:2px solid var(--border2);padding:0 1.5rem;display:flex;align-items:center;gap:10px;height:60px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
  .logo{font-size:20px;font-weight:700;color:var(--text);}
  .logo span{color:var(--blue);}
  .search-wrap{position:relative;flex:1;max-width:340px;min-width:130px;}
  .search-wrap input{width:100%;padding:9px 12px 9px 36px;border:2px solid var(--border2);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-size:15px;}
  .search-wrap input:focus{outline:none;border-color:var(--blue);}
  .search-wrap input::placeholder{color:var(--text3);}
  .s-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
  .topbar-right{display:flex;gap:8px;margin-right:auto;flex-wrap:wrap;align-items:center;}

  .btn{padding:8px 16px;border:2px solid var(--border2);border-radius:var(--rsm);background:var(--bg3);cursor:pointer;font-size:14px;font-weight:500;color:var(--text);transition:background .12s;white-space:nowrap;}
  .btn:hover{background:var(--bg4);}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
  .btn-primary:hover{opacity:.88;background:var(--blue);}
  .btn-danger{color:var(--red);border-color:var(--red);background:var(--red-bg);}
  .btn-danger:hover{background:#3a1010;}
  .btn-run{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:700;}
  .btn-run:hover{background:#164a2a;}
  .btn-bat{background:var(--purple-bg);border-color:var(--purple);color:var(--purple);font-weight:600;}
  .btn-bat:hover{background:#3d2060;}
  .btn-sm{padding:6px 11px;font-size:13px;}

  .status-dot{width:9px;height:9px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .status-dot.ok{background:var(--green);}
  .status-dot.err{background:var(--red);}
  .status-lbl{font-size:12px;color:var(--text3);}

  .save-dot{font-size:13px;color:var(--text3);padding:5px 10px;border-radius:20px;white-space:nowrap;}
  .save-dot.saved{color:var(--green);background:var(--green-bg);font-weight:600;}
  .save-dot.err{color:var(--red);background:var(--red-bg);}

  .main{padding:1.4rem 1.5rem;max-width:1120px;margin:0 auto;}

  .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.2rem;}
  .stat{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:.8rem 1.1rem;}
  .stat-lbl{font-size:13px;color:var(--text3);margin-bottom:4px;font-weight:500;}
  .stat-val{font-size:26px;font-weight:700;}

  .filter-row{display:flex;gap:7px;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center;}
  .fbtn{padding:7px 15px;border:2px solid var(--border2);border-radius:20px;background:var(--bg2);cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);}
  .fbtn:hover{background:var(--bg3);color:var(--text);}
  .fbtn.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text);font-weight:600;}
  .sort-sel{margin-right:auto;padding:7px 12px;border:2px solid var(--border2);border-radius:var(--rsm);background:var(--bg2);color:var(--text);font-size:14px;cursor:pointer;}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
  .card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;transition:border-color .15s;}
  .card:hover{border-color:var(--border2);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .card-name{font-size:16px;font-weight:700;flex:1;line-height:1.3;color:var(--text);cursor:pointer;}
  .card-name:hover{color:var(--blue-text);}
  .badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;border:2px solid transparent;}
  .b-active{background:var(--green-bg);color:var(--green);border-color:var(--green);}
  .b-paused{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);}
  .b-done{background:var(--bg3);color:var(--text3);border-color:var(--border2);}
  .card-desc{font-size:14px;color:var(--text2);margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;}
  .path-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .path-ico{font-size:13px;flex-shrink:0;width:18px;color:var(--text3);}
  .path-val{font-family:var(--mono);font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg3);padding:3px 8px;border-radius:4px;border:1px solid var(--border);}
  .copy-btn{font-size:12px;padding:3px 8px;border:1px solid var(--border2);border-radius:4px;background:var(--bg3);cursor:pointer;color:var(--text2);white-space:nowrap;flex-shrink:0;}
  .copy-btn:hover{background:var(--bg4);color:var(--text);}
  .card-links{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
  .link-pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;border:2px solid var(--border2);text-decoration:none;color:var(--text2);background:var(--bg3);}
  .link-pill:hover{border-color:var(--blue);color:var(--blue-text);}
  .link-pill.claude{border-color:var(--blue);color:var(--blue-text);background:var(--blue-bg);}
  .dep-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
  .dep-chip{font-size:12px;padding:3px 9px;border-radius:20px;border:2px solid var(--border2);color:var(--text2);background:var(--bg3);}
  .card-notes{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;background:var(--bg3);padding:6px 10px;border-radius:var(--rsm);border-right:3px solid var(--border2);cursor:pointer;}
  .run-bar{display:flex;gap:7px;margin-top:9px;padding-top:9px;border-top:2px solid var(--border);flex-wrap:wrap;align-items:center;}
  .run-bar .lbl{font-size:11px;color:var(--text3);flex:1;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .ai-tags{display:flex;gap:4px;flex-wrap:wrap;}
  .ai-tag{font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;border:2px solid var(--border2);color:var(--text2);background:var(--bg3);}
  .card-date{font-size:12px;color:var(--text3);cursor:pointer;}
  .empty-state{text-align:center;padding:4rem;color:var(--text3);grid-column:1/-1;}
  .empty-state .big{font-size:50px;margin-bottom:.6rem;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg2);border:2px solid var(--border2);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:640px;margin:auto;}
  .modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
  .modal-title{font-size:18px;font-weight:700;}
  .modal-x{background:var(--bg3);border:2px solid var(--border2);border-radius:var(--rsm);font-size:15px;cursor:pointer;color:var(--text);padding:5px 12px;font-weight:700;}
  .modal-x:hover{background:var(--red-bg);border-color:var(--red);color:var(--red);}

  .tabs{display:flex;border-bottom:2px solid var(--border2);margin-bottom:1.1rem;overflow-x:auto;}
  .tab{padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text3);border:none;border-bottom:3px solid transparent;background:transparent;white-space:nowrap;margin-bottom:-2px;}
  .tab:hover{color:var(--text2);}
  .tab.on{color:var(--blue-text);border-bottom-color:var(--blue);font-weight:700;}
  .tab-panel{display:none;}
  .tab-panel.on{display:block;}

  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field textarea,.field select{width:100%;padding:9px 12px;border:2px solid var(--border2);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-size:15px;font-family:inherit;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue);}
  .field input::placeholder,.field textarea::placeholder{color:var(--text3);}
  .field textarea{resize:vertical;min-height:80px;line-height:1.5;}
  .field select{cursor:pointer;}
  .field select option{background:var(--bg3);color:var(--text);}
  .frow{display:flex;gap:8px;align-items:flex-start;}
  .frow input{flex:1;}
  .field-hint{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.5;}
  .field-hint.warn{color:var(--amber);}

  .ai-checks{display:flex;gap:16px;flex-wrap:wrap;padding:4px 0;}
  .ai-check{display:flex;align-items:center;gap:7px;font-size:15px;cursor:pointer;font-weight:500;}
  .ai-check input{cursor:pointer;width:17px;height:17px;accent-color:var(--blue);}

  .bat-preview{background:var(--bg3);border:2px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;font-family:var(--mono);font-size:13px;color:var(--green);line-height:1.7;margin-bottom:.8rem;white-space:pre-wrap;word-break:break-all;}
  .bat-actions{display:flex;gap:8px;flex-wrap:wrap;}

  .dep-list{border:2px solid var(--border2);border-radius:var(--rsm);max-height:180px;overflow-y:auto;background:var(--bg3);}
  .dep-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
  .dep-opt:last-child{border-bottom:none;}
  .dep-opt:hover{background:var(--bg4);}
  .dep-opt input{cursor:pointer;width:16px;height:16px;accent-color:var(--blue);flex-shrink:0;}
  .dep-opt-name{font-size:14px;font-weight:600;}
  .dep-opt-path{font-size:12px;color:var(--text3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}

  .ver-list{max-height:190px;overflow-y:auto;margin-bottom:.8rem;}
  .ver-item{padding:9px 12px;border:2px solid var(--border);border-radius:var(--rsm);margin-bottom:7px;background:var(--bg3);}
  .ver-date{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;font-weight:600;}
  .ver-note{font-size:14px;line-height:1.4;}
  .ver-add{display:flex;gap:8px;}
  .ver-add input{flex:1;padding:9px 12px;border:2px solid var(--border2);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;}
  .ver-add input:focus{outline:none;border-color:var(--blue);}
  .ver-add input::placeholder{color:var(--text3);}

  .modal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:1.3rem;padding-top:1.1rem;border-top:2px solid var(--border);}
  .foot-right{display:flex;gap:8px;}

  .json-modal{max-width:680px;}
  .json-ta{width:100%;min-height:300px;padding:12px;border:2px solid var(--border2);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-size:12px;font-family:var(--mono);line-height:1.6;resize:vertical;margin-bottom:1rem;}
  .json-ta:focus{outline:none;border-color:var(--blue);}

  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);border:2px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:24px;font-size:15px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:600px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .topbar{height:auto;padding:.7rem 1rem;}
    .main{padding:1rem;}
  }
</style>
</head>
<body>

<input type="file" id="folderPicker" webkitdirectory style="display:none" onchange="handleFolderPick(this)">
<input type="file" id="filePicker" style="display:none" onchange="handleFilePick(this)">

<div class="topbar">
  <div class="logo">Dev<span>Track</span></div>
  <div style="display:flex;align-items:center;gap:6px;">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-lbl" id="statusLbl">מתחבר...</span>
  </div>
  <div class="search-wrap">
    <span class="s-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="חיפוש פרויקט..." oninput="renderCards()">
  </div>
  <div class="topbar-right">
    <span id="agentStatus" style="font-size:12px;color:var(--text3);">○ Agent לא פעיל</span>
    <button class="btn btn-primary" onclick="openAdd()">+ פרויקט חדש</button>
    <button class="btn" onclick="openJson('export')">↑ JSON</button>
    <button class="btn" onclick="openJsonImport()">↓ שחזור</button>
    <span class="save-dot" id="saveDot">—</span>
  </div>
</div>

<div class="main">
  <div class="stats" id="statsRow"></div>
  <div class="filter-row">
    <button class="fbtn on" onclick="setFilter('all',this)">הכל</button>
    <button class="fbtn" onclick="setFilter('active',this)">▶ בפיתוח</button>
    <button class="fbtn" onclick="setFilter('paused',this)">‖ הושהה</button>
    <button class="fbtn" onclick="setFilter('done',this)">✓ הושלם</button>
    <select class="sort-sel" onchange="renderCards()">
      <option value="created_desc">חדש ראשון</option>
      <option value="created_asc">ישן ראשון</option>
      <option value="name_asc">לפי שם</option>
      <option value="status">לפי סטטוס</option>
    </select>
  </div>
  <div class="cards" id="cardsGrid">
    <div class="empty-state" style="grid-column:1/-1">
      <div class="spinner" style="width:28px;height:28px;border-width:3px;margin:0 auto 1rem;display:block;"></div>
      <p>טוען נתונים מהשרת...</p>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">פרויקט חדש</div>
      <button class="modal-x" onclick="tryCloseModal()">✕ סגור</button>
    </div>
    <input type="hidden" id="editId">
    <div class="tabs">
      <button class="tab on" onclick="switchTab(0,this)">📋 פרטים</button>
      <button class="tab" onclick="switchTab(1,this)">📁 נתיבים</button>
      <button class="tab" onclick="switchTab(2,this)">▶ הרצה</button>
      <button class="tab" onclick="switchTab(3,this)">🔗 קישורים</button>
      <button class="tab" onclick="switchTab(4,this)">⛓ תלויות</button>
      <button class="tab" onclick="switchTab(5,this)">📅 גרסאות</button>
    </div>

    <div class="tab-panel on" id="tab0">
      <div class="field"><label>שם הפרויקט *</label><input type="text" id="fName" placeholder="שם הפרויקט" oninput="markDirty()"></div>
      <div class="field"><label>תיאור</label><textarea id="fDesc" placeholder="מה הפרויקט עושה?" oninput="markDirty()"></textarea></div>
      <div class="field">
        <label>סטטוס</label>
        <select id="fStatus" onchange="markDirty()">
          <option value="active">▶ בפיתוח</option>
          <option value="paused">‖ הושהה</option>
          <option value="done">✓ הושלם</option>
        </select>
      </div>
      <div class="field"><label>הערות חופשיות</label><textarea id="fNotes" placeholder="env variables, הגדרות מיוחדות, TODO..." style="min-height:110px" oninput="markDirty()"></textarea></div>
    </div>

    <div class="tab-panel" id="tab1">
      <div class="field">
        <label>📁 נתיב תיקיית הפרויקט</label>
        <div class="frow">
          <input type="text" id="fPath" placeholder="C:\projects\my-app" oninput="markDirty();refreshBatPreview()">
          <button class="btn btn-sm" onclick="copyField('fPath')">📋</button>
          <button class="btn btn-sm" onclick="document.getElementById('folderPicker').click()">📂</button>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab2">
      <div class="field">
        <label>▶ פקודת הרצה</label>
        <div class="frow">
          <input type="text" id="fExe" placeholder="npm start  או  python main.py  או  .\run.bat" oninput="markDirty();refreshBatPreview()">
          <button class="btn btn-sm" onclick="copyField('fExe')">📋</button>
        </div>
      </div>
      <div class="field">
        <label>🟣 נתיב קובץ .BAT (אחרי שמירה)</label>
        <div class="frow">
          <input type="text" id="fBatPath" placeholder="C:\Users\שם\Desktop\my-app.bat" oninput="markDirty()">
          <button class="btn btn-sm" onclick="copyField('fBatPath')">📋</button>
        </div>
        <div class="field-hint">לאחר הורדת ה-.bat ושמירתו — הכנס כאן את הנתיב המלא</div>
      </div>
      <hr style="border-color:var(--border);margin:1rem 0">
      <div class="field">
        <label>תצוגה מקדימה .BAT</label>
        <div class="bat-preview" id="batPreview">— הכנס נתיב ופקודה —</div>
        <div class="bat-actions">
          <button class="btn btn-bat" onclick="downloadBat()">⬇ הורד .bat</button>
          <button class="btn btn-sm" onclick="copyBatContent()">📋 העתק תוכן</button>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab3">
      <div class="field">
        <label>כלי AI</label>
        <div class="ai-checks">
          <label class="ai-check"><input type="checkbox" id="aiClaude" onchange="markDirty()"> Claude</label>
          <label class="ai-check"><input type="checkbox" id="aiGenspark" onchange="markDirty()"> Genspark</label>
          <label class="ai-check"><input type="checkbox" id="aiCursor" onchange="markDirty()"> Cursor</label>
          <label class="ai-check"><input type="checkbox" id="aiCopilot" onchange="markDirty()"> Copilot</label>
          <label class="ai-check"><input type="checkbox" id="aiOther" onchange="markDirty()"> אחר</label>
        </div>
      </div>
      <div class="field"><label>🤖 Claude chat</label><div class="frow"><input type="text" id="fClaudeUrl" placeholder="https://claude.ai/chat/..." oninput="markDirty()"><button class="btn btn-sm" onclick="openFieldUrl('fClaudeUrl')">↗</button></div></div>
      <div class="field"><label>✨ Genspark</label><div class="frow"><input type="text" id="fGensparkUrl" placeholder="https://www.genspark.ai/..." oninput="markDirty()"><button class="btn btn-sm" onclick="openFieldUrl('fGensparkUrl')">↗</button></div></div>
      <div class="field"><label>🔗 קישור נוסף</label><div class="frow"><input type="text" id="fOtherUrl" placeholder="https://..." oninput="markDirty()"><button class="btn btn-sm" onclick="openFieldUrl('fOtherUrl')">↗</button></div></div>
    </div>

    <div class="tab-panel" id="tab4">
      <p style="font-size:14px;color:var(--text2);margin-bottom:.9rem;line-height:1.6">סמן פרויקטים שהפרויקט הזה <strong style="color:var(--text)">משתמש בהם</strong>.</p>
      <div class="dep-list" id="depList"><div style="padding:14px;color:var(--text3);font-size:14px">אין פרויקטים אחרים</div></div>
    </div>

    <div class="tab-panel" id="tab5">
      <div class="ver-list" id="verList"></div>
      <div class="ver-add">
        <input type="text" id="verInput" placeholder="מה השתנה?">
        <button class="btn btn-primary" onclick="addVer()">+ הוסף</button>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteProj()" style="display:none">🗑 מחק</button>
      <div class="foot-right">
        <button class="btn" onclick="tryCloseModal()">ביטול</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveProj()">💾 שמור</button>
      </div>
    </div>
  </div>
</div>

<!-- JSON MODAL -->
<div class="overlay" id="jsonOverlay">
  <div class="modal json-modal">
    <div class="modal-hdr">
      <div class="modal-title" id="jsonTitle">ייצוא JSON</div>
      <button class="modal-x" onclick="closeJson()">✕ סגור</button>
    </div>
    <textarea class="json-ta" id="jsonTa" spellcheck="false"></textarea>
    <div style="display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" id="jCopy" onclick="copyJson()">📋 העתק</button>
        <button class="btn btn-primary" id="jDl" onclick="dlJson()">⬇ הורד</button>
        <button class="btn btn-primary" id="jImp" onclick="importJson()" style="display:none">⬆ טען</button>
      </div>
      <span id="jmsg" style="font-size:14px;font-weight:600"></span>
      <button class="btn" onclick="closeJson()">סגור</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
// כשרץ ב-Electron — התחבר ישירות ל-Render לנתונים
// פעולות מקומיות (הרצה, dialog) — דרך localhost:7474
const RENDER = 'https://devtrack-y6ef.onrender.com';
const LOCAL  = 'http://localhost:7474';
const API    = RENDER;   // נתונים מ-Render
const AGENT  = LOCAL;    // פעולות מקומיות

// ─── STATE ────────────────────────────────────────────────
let projects = [];
let curFilter = 'all';
let isDirty = false;
let isLocal = false;
let agentOk = true;   // תמיד true ב-Electron

// ─── API HELPERS ──────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ─── CONNECTION STATUS ────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLbl');
  try {
    await apiFetch('/api/health');
    dot.className = 'status-dot ok';
    isLocal = true; agentOk = true;
    lbl.textContent = 'DevTrack ✓';
    document.getElementById('agentStatus').textContent = '⚡ מקומי';
    document.getElementById('agentStatus').style.color = 'var(--green)';
  } catch {
    dot.className = 'status-dot err';
    lbl.textContent = 'שגיאה';
  }
}

// ─── LOAD / SAVE ──────────────────────────────────────────
async function loadData() {
  try {
    projects = await apiFetch('/api/projects');
    renderAll();
    checkHealth();
  } catch (e) {
    document.getElementById('cardsGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><div class="big">⚠</div><p style="color:var(--red)">לא ניתן להתחבר ל-Render<br><small style="color:var(--text3)">המתן 30 שניות ונסה שוב — Render אולי נרדם</small></p><button class="btn btn-primary" style="margin-top:1rem" onclick="loadData()">🔄 נסה שוב</button></div>';
    checkHealth();
  }
}

function setSaveDot(state, text) {
  const el = document.getElementById('saveDot');
  el.textContent = text;
  el.className = 'save-dot' + (state ? ' ' + state : '');
  if (state === 'saved') setTimeout(() => { el.textContent = '—'; el.className = 'save-dot'; }, 2500);
}

// ─── DIRTY ────────────────────────────────────────────────
function markDirty() { isDirty = true; }
function clearDirty() { isDirty = false; }
function tryCloseModal() {
  if (isDirty && !confirm('יש שינויים שלא נשמרו — לסגור בכל זאת?')) return;
  closeModal();
}

// ─── RENDER ───────────────────────────────────────────────
function renderAll() { renderStats(); renderCards(); }

function renderStats() {
  const t = projects.length,
    a = projects.filter(p => p.status === 'active').length,
    pa = projects.filter(p => p.status === 'paused').length,
    d = projects.filter(p => p.status === 'done').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-lbl">סה"כ</div><div class="stat-val">${t}</div></div>
    <div class="stat"><div class="stat-lbl">▶ בפיתוח</div><div class="stat-val" style="color:var(--green)">${a}</div></div>
    <div class="stat"><div class="stat-lbl">‖ הושהה</div><div class="stat-val" style="color:var(--amber)">${pa}</div></div>
    <div class="stat"><div class="stat-lbl">✓ הושלם</div><div class="stat-val" style="color:var(--text3)">${d}</div></div>`;
}

function getSorted() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.querySelector('.sort-sel').value;
  let list = projects.filter(p => {
    if (curFilter !== 'all' && p.status !== curFilter) return false;
    if (q) return [p.name, p.desc, p.path, p.notes, p.exe].join(' ').toLowerCase().includes(q);
    return true;
  });
  if (sort === 'created_desc') list.sort((a, b) => b.created > a.created ? 1 : -1);
  else if (sort === 'created_asc') list.sort((a, b) => a.created > b.created ? 1 : -1);
  else if (sort === 'name_asc') list.sort((a, b) => a.name.localeCompare(b.name, 'he'));
  else if (sort === 'status') { const o = { active: 0, paused: 1, done: 2 }; list.sort((a, b) => o[a.status] - o[b.status]); }
  return list;
}

function depNames(ids) {
  return (ids || []).map(id => { const p = projects.find(x => x.id === id); return p ? p.name : null; }).filter(Boolean);
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderCards() {
  const list = getSorted();
  const g = document.getElementById('cardsGrid');
  if (!list.length) {
    g.innerHTML = '<div class="empty-state"><div class="big">📭</div><p>אין פרויקטים להצגה</p></div>';
    return;
  }
  g.innerHTML = list.map(p => {
    const bc = p.status === 'active' ? 'b-active' : p.status === 'paused' ? 'b-paused' : 'b-done';
    const bt = p.status === 'active' ? '▶ בפיתוח' : p.status === 'paused' ? '‖ הושהה' : '✓ הושלם';
    const tags = (p.ai || []).map(a => `<span class="ai-tag">${esc(a)}</span>`).join('');
    const vc = (p.versions || []).length;
    const deps = depNames(p.deps);
    const pid = esc(p.id);
    const hasRun = !!(p.exe || p.batPath);
    return `<div class="card">
      <div class="card-top">
        <div class="card-name" onclick="openEdit('${pid}')">${esc(p.name)}</div>
        <span class="badge ${bc}">${bt}</span>
      </div>
      ${p.desc ? `<div class="card-desc" onclick="openEdit('${pid}')">${esc(p.desc)}</div>` : ''}
      ${p.path ? `<div class="path-row"><span class="path-ico">📁</span><span class="path-val" title="${esc(p.path)}">${esc(p.path)}</span><button class="copy-btn" onclick="copyText(${JSON.stringify(p.path)})">📋</button></div>` : ''}
      ${p.exe ? `<div class="path-row"><span class="path-ico">▶</span><span class="path-val" title="${esc(p.exe)}">${esc(p.exe)}</span><button class="copy-btn" onclick="copyText(${JSON.stringify(p.exe)})">📋</button></div>` : ''}
      ${(p.claudeUrl || p.gensparkUrl || p.otherUrl) ? `<div class="card-links">
        ${p.claudeUrl ? `<a class="link-pill claude" href="${esc(p.claudeUrl)}" target="_blank">🤖 Claude ↗</a>` : ''}
        ${p.gensparkUrl ? `<a class="link-pill" href="${esc(p.gensparkUrl)}" target="_blank">✨ Genspark ↗</a>` : ''}
        ${p.otherUrl ? `<a class="link-pill" href="${esc(p.otherUrl)}" target="_blank">🔗 ↗</a>` : ''}
      </div>` : ''}
      ${deps.length ? `<div class="dep-chips">${deps.map(n => `<span class="dep-chip">⛓ ${esc(n)}</span>`).join('')}</div>` : ''}
      ${p.notes ? `<div class="card-notes" onclick="openEdit('${pid}')">${esc(p.notes)}</div>` : ''}
      ${(hasRun || p.path) ? `<div class="run-bar">
        ${hasRun ? `<button class="btn btn-run btn-sm" onclick="runBat('${pid}',event)" title="${agentOk ? 'מריץ ישירות' : 'מעתיק פקודה'}">▶ הרץ</button>` : ''}
        ${p.exe ? `<button class="btn btn-bat btn-sm" onclick="dlBatCard('${pid}',event)">⬇ .bat</button>` : ''}
        ${p.path ? `<button class="btn btn-sm" onclick="openFolderAgent('${pid}',event)" title="פתח תיקייה">📁</button>` : ''}
      </div>` : ''}
      <div class="card-foot">
        <div class="ai-tags">${tags}</div>
        <span class="card-date" onclick="openEdit('${pid}')">${vc ? `📅 ${vc} גרסאות` : p.created || ''}</span>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f, el) { curFilter = f; document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on')); el.classList.add('on'); renderCards(); }
function switchTab(i, el) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('on')); document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('on')); el.classList.add('on'); document.getElementById('tab' + i).classList.add('on'); }

// ─── MODAL ────────────────────────────────────────────────
function clearForm() {
  ['fName', 'fDesc', 'fPath', 'fExe', 'fBatPath', 'fClaudeUrl', 'fGensparkUrl', 'fOtherUrl', 'fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fStatus').value = 'active';
  ['aiClaude', 'aiGenspark', 'aiCursor', 'aiCopilot', 'aiOther'].forEach(id => document.getElementById(id).checked = false);
  document.getElementById('batPreview').textContent = '— הכנס נתיב ופקודה —';
}

function openAdd() {
  document.getElementById('modalTitle').textContent = 'פרויקט חדש';
  document.getElementById('editId').value = '';
  clearForm();
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('verList').innerHTML = '<div style="color:var(--text3);font-size:14px;padding:6px">אין גרסאות עדיין</div>';
  document.getElementById('verInput').value = '';
  renderDepOptions([]);
  clearDirty();
  switchTab(0, document.querySelectorAll('.tab')[0]);
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 80);
}

function openEdit(id) {
  const p = projects.find(x => x.id === id); if (!p) return;
  document.getElementById('modalTitle').textContent = 'עריכת פרויקט';
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = p.name || '';
  document.getElementById('fDesc').value = p.desc || '';
  document.getElementById('fPath').value = p.path || '';
  document.getElementById('fExe').value = p.exe || '';
  document.getElementById('fBatPath').value = p.batPath || '';
  document.getElementById('fClaudeUrl').value = p.claudeUrl || '';
  document.getElementById('fGensparkUrl').value = p.gensparkUrl || '';
  document.getElementById('fOtherUrl').value = p.otherUrl || '';
  document.getElementById('fNotes').value = p.notes || '';
  document.getElementById('fStatus').value = p.status || 'active';
  document.getElementById('aiClaude').checked = (p.ai || []).includes('Claude');
  document.getElementById('aiGenspark').checked = (p.ai || []).includes('Genspark');
  document.getElementById('aiCursor').checked = (p.ai || []).includes('Cursor');
  document.getElementById('aiCopilot').checked = (p.ai || []).includes('Copilot');
  document.getElementById('aiOther').checked = (p.ai || []).includes('אחר');
  document.getElementById('deleteBtn').style.display = '';
  renderDepOptions(p.deps || [], id);
  renderVers(p.versions || []);
  document.getElementById('verInput').value = '';
  refreshBatPreview();
  clearDirty();
  switchTab(0, document.querySelectorAll('.tab')[0]);
  document.getElementById('editOverlay').classList.add('open');
}

function closeModal() { document.getElementById('editOverlay').classList.remove('open'); clearDirty(); }

function getFormData() {
  const ai = [];
  if (document.getElementById('aiClaude').checked) ai.push('Claude');
  if (document.getElementById('aiGenspark').checked) ai.push('Genspark');
  if (document.getElementById('aiCursor').checked) ai.push('Cursor');
  if (document.getElementById('aiCopilot').checked) ai.push('Copilot');
  if (document.getElementById('aiOther').checked) ai.push('אחר');
  return {
    name: document.getElementById('fName').value.trim(),
    desc: document.getElementById('fDesc').value.trim(),
    status: document.getElementById('fStatus').value,
    notes: document.getElementById('fNotes').value.trim(),
    path: document.getElementById('fPath').value.trim(),
    exe: document.getElementById('fExe').value.trim(),
    batPath: document.getElementById('fBatPath').value.trim(),
    claudeUrl: document.getElementById('fClaudeUrl').value.trim(),
    gensparkUrl: document.getElementById('fGensparkUrl').value.trim(),
    otherUrl: document.getElementById('fOtherUrl').value.trim(),
    ai,
    deps: getSelDeps(),
  };
}

async function saveProj() {
  const id = document.getElementById('editId').value;
  const data = getFormData();
  if (!data.name) { document.getElementById('fName').focus(); toast('יש למלא שם פרויקט'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.innerHTML = '💾 שומר... <span class="spinner"></span>';
  setSaveDot('', 'שומר...');

  try {
    if (id) {
      const existing = projects.find(x => x.id === id);
      const updated = { ...existing, ...data };
      const res = await apiFetch(`/api/projects/${id}`, { method: 'PUT', body: JSON.stringify(updated) });
      const idx = projects.findIndex(x => x.id === id);
      if (idx !== -1) projects[idx] = res;
    } else {
      const res = await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify(data) });
      projects.unshift(res);
    }
    setSaveDot('saved', '✓ נשמר');
    renderAll(); clearDirty(); closeModal();
    toast(id ? 'עודכן ✓' : 'נוסף ✓');
  } catch (e) {
    setSaveDot('err', '⚠ שגיאה');
    toast('שגיאה בשמירה: ' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = '💾 שמור';
  }
}

async function deleteProj() {
  const id = document.getElementById('editId').value; if (!id) return;
  const p = projects.find(x => x.id === id);
  if (!confirm(`למחוק את "${p ? p.name : 'פרויקט זה'}"?`)) return;
  try {
    await apiFetch(`/api/projects/${id}`, { method: 'DELETE' });
    projects = projects.filter(p => p.id !== id);
    renderAll(); clearDirty(); closeModal(); toast('נמחק');
  } catch (e) { toast('שגיאה: ' + e.message); }
}

function renderDepOptions(selected, currentId) {
  const others = projects.filter(p => p.id !== currentId);
  const el = document.getElementById('depList');
  if (!others.length) { el.innerHTML = '<div style="padding:14px;color:var(--text3);font-size:14px">אין פרויקטים אחרים</div>'; return; }
  el.innerHTML = others.map(p => `<label class="dep-opt"><input type="checkbox" data-depid="${esc(p.id)}" ${selected.includes(p.id) ? 'checked' : ''}><span class="dep-opt-name">${esc(p.name)}</span><span class="dep-opt-path">${esc(p.path || '')}</span></label>`).join('');
}
function getSelDeps() { return [...document.querySelectorAll('#depList input:checked')].map(el => el.dataset.depid); }

function renderVers(vers) {
  const el = document.getElementById('verList');
  if (!vers.length) { el.innerHTML = '<div style="color:var(--text3);font-size:14px;padding:6px">אין גרסאות עדיין</div>'; return; }
  el.innerHTML = [...vers].reverse().map(v => `<div class="ver-item"><div class="ver-date">${esc(v.date)}</div><div class="ver-note">${esc(v.note)}</div></div>`).join('');
}

async function addVer() {
  const id = document.getElementById('editId').value;
  const note = document.getElementById('verInput').value.trim();
  if (!note) { document.getElementById('verInput').focus(); return; }
  if (!id) { toast('שמור את הפרויקט קודם'); return; }
  try {
    const updated = await apiFetch(`/api/projects/${id}/versions`, { method: 'POST', body: JSON.stringify({ note }) });
    const idx = projects.findIndex(x => x.id === id);
    if (idx !== -1) projects[idx] = updated;
    renderVers(updated.versions || []);
    document.getElementById('verInput').value = '';
    renderAll();
  } catch (e) { toast('שגיאה: ' + e.message); }
}

// ─── BAT ──────────────────────────────────────────────────
function buildBat(path, exe, name) {
  return `@echo off\r\nrem DevTrack — ${name || 'project'}\r\ncd /d "${path || 'C:\\projects\\app'}"\r\n${exe || 'echo לא הוגדרה פקודה'}\r\npause\r\n`;
}
function refreshBatPreview() {
  const path = document.getElementById('fPath').value.trim();
  const exe = document.getElementById('fExe').value.trim();
  const name = document.getElementById('fName').value.trim();
  const el = document.getElementById('batPreview');
  if (!path && !exe) { el.textContent = '— הכנס נתיב ופקודה —'; return; }
  el.textContent = buildBat(path, exe, name);
}
function downloadBat() {
  const path = document.getElementById('fPath').value.trim();
  const exe = document.getElementById('fExe').value.trim();
  const name = document.getElementById('fName').value.trim() || 'project';
  if (!path || !exe) { toast('הכנס נתיב ופקודה קודם'); return; }
  const blob = new Blob([buildBat(path, exe, name)], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.replace(/[^\w\-]/g, '_') + '.bat';
  a.click();
  toast('הורד ✓ — שמור בדסקטופ ועדכן את "נתיב .bat"');
}
function copyBatContent() {
  const path = document.getElementById('fPath').value.trim();
  const exe = document.getElementById('fExe').value.trim();
  const name = document.getElementById('fName').value.trim();
  if (!path && !exe) { toast('אין תוכן'); return; }
  copyText(buildBat(path, exe, name));
}
function dlBatCard(pid, event) {
  event.stopPropagation();
  const p = projects.find(x => x.id === pid); if (!p) return;
  if (!p.path || !p.exe) { toast('הכנס נתיב ופקודה בפרטי הפרויקט'); return; }
  const blob = new Blob([buildBat(p.path, p.exe, p.name)], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (p.name || 'project').replace(/[^\w\-]/g, '_') + '.bat';
  a.click();
}

async function runBat(pid, event) {
  event.stopPropagation();
  const p = projects.find(x => x.id === pid); if (!p) return;
  if (agentOk) {
    // הרצה דרך local agent
    try {
      const body = p.batPath ? { bat_path: p.batPath } : { exe_cmd: p.exe, work_dir: p.path };
      const res = await fetch(LOCAL + '/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(5000)
      });
      const data = await res.json();
      if (data.ok) toast('▶ הופעל!');
      else toast('שגיאה: ' + (data.error || 'לא ידוע'));
    } catch (e) { toast('Agent לא מגיב: ' + e.message); }
  } else if (p.batPath) {
    copyText(p.batPath);
    toast('Agent לא פעיל — הועתק נתיב .bat\nהדבק ב-Win+R');
  } else if (p.exe) {
    const cmd = p.path ? `cd /d "${p.path}" && ${p.exe}` : p.exe;
    copyText(cmd);
    toast('Agent לא פעיל — הועתקה פקודה לטרמינל');
  } else {
    toast('לא הוגדרה פקודת הרצה');
  }
}

async function openFolderAgent(pid, event) {
  event.stopPropagation();
  const p = projects.find(x => x.id === pid); if (!p || !p.path) return;
  if (agentOk) {
    try {
      await fetch(LOCAL + '/api/open-folder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: p.path }),
        signal: AbortSignal.timeout(3000)
      });
      toast('📁 נפתח בסייר');
    } catch { toast('Agent לא מגיב'); }
  } else {
    copyText(p.path);
    toast('Agent לא פעיל — הועתק נתיב');
  }
}

// ─── UTILS ────────────────────────────────────────────────
function copyField(fid) { const v = document.getElementById(fid).value.trim(); if (!v) { toast('אין ערך'); return; } copyText(v); }
function copyText(v) { if (navigator.clipboard) navigator.clipboard.writeText(v).then(() => toast('הועתק ✓')); else { const ta = document.createElement('textarea'); ta.value = v; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('הועתק ✓'); } }
function openFieldUrl(fid) { const v = document.getElementById(fid).value.trim(); if (!v) { toast('אין URL'); return; } window.open(v, '_blank'); }
function handleFolderPick(input) { const f = input.files[0]; if (!f) return; const p = f.path || (f.webkitRelativePath ? f.webkitRelativePath.split('/')[0] : f.name); document.getElementById('fPath').value = p; markDirty(); refreshBatPreview(); toast('תיקייה: ' + p); input.value = ''; }
async function handleFilePick(input) {
  try {
    const r = await fetch(LOCAL+'/api/pick-file').then(r=>r.json());
    if (r.canceled) return;
    document.getElementById('fExe').value = r.path;
    markDirty(); refreshBatPreview(); toast('קובץ: ' + r.path);
  } catch { toast('שגיאה בבחירת קובץ'); }
}
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2500); }

// ─── JSON EXPORT / IMPORT ─────────────────────────────────
async function openJsonImport() {
  try {
    const r = await fetch(LOCAL+'/api/pick-json').then(r=>r.json());
    if (r.canceled) return;
    const parsed = JSON.parse(r.content);
    const imp = Array.isArray(parsed) ? parsed : (parsed.projects || null);
    if (!imp || !imp.length) throw new Error('מבנה JSON לא תקין');
    if (!confirm(`לייבא ${imp.length} פרויקטים מ-"${r.filename}"?\nהנתונים הקיימים יוחלפו.`)) return;
    for (const p of projects) { try { await apiFetch('/api/projects/' + p.id, { method: 'DELETE' }); } catch {} }
    for (const p of imp) { try { await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify(p) }); } catch {} }
    projects = await apiFetch('/api/projects');
    renderAll();
    toast(`✓ יובאו ${imp.length} פרויקטים מ-${r.filename}`);
  } catch (e) { toast('שגיאה: ' + e.message); }
}

function openJson(mode) {
  const ta = document.getElementById('jsonTa'); document.getElementById('jmsg').textContent = '';
  if (mode === 'export') {
    document.getElementById('jsonTitle').textContent = 'ייצוא JSON';
    ta.value = JSON.stringify({ exported: new Date().toISOString().slice(0, 16), count: projects.length, projects }, null, 2);
    ta.readOnly = true;
    document.getElementById('jCopy').style.display = ''; document.getElementById('jDl').style.display = ''; document.getElementById('jImp').style.display = 'none';
  } else {
    document.getElementById('jsonTitle').textContent = 'ייבוא JSON — שחזור';
    ta.value = ''; ta.readOnly = false; ta.placeholder = 'הדבק JSON כאן...';
    document.getElementById('jCopy').style.display = 'none'; document.getElementById('jDl').style.display = 'none'; document.getElementById('jImp').style.display = '';
  }
  document.getElementById('jsonOverlay').classList.add('open');
}
function closeJson() { document.getElementById('jsonOverlay').classList.remove('open'); }
function copyJson() { navigator.clipboard.writeText(document.getElementById('jsonTa').value).then(() => { document.getElementById('jmsg').textContent = '✓ הועתק'; document.getElementById('jmsg').style.color = 'var(--green)'; }); }
function dlJson() { const blob = new Blob([document.getElementById('jsonTa').value], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'devtrack-' + new Date().toISOString().slice(0, 10) + '.json'; a.click(); }
async function importJson() {
  const el = document.getElementById('jmsg');
  try {
    const parsed = JSON.parse(document.getElementById('jsonTa').value.trim());
    const imp = Array.isArray(parsed) ? parsed : (parsed.projects || null);
    if (!imp || !imp.length) throw new Error('מבנה לא תקין');
    if (!confirm(`לייבא ${imp.length} פרויקטים? הנתונים הקיימים יוחלפו.`)) return;
    for (const p of projects) { try { await apiFetch(`/api/projects/${p.id}`, { method: 'DELETE' }); } catch { } }
    for (const p of imp) { try { await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify(p) }); } catch { } }
    projects = await apiFetch('/api/projects');
    renderAll();
    el.textContent = `✓ יובאו ${imp.length} פרויקטים`; el.style.color = 'var(--green)';
    setTimeout(closeJson, 1800);
  } catch (e) { el.textContent = '⚠ ' + e.message; el.style.color = 'var(--red)'; }
}
document.getElementById('jsonTa').addEventListener('dragover', e => e.preventDefault());
document.getElementById('jsonTa').addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (!f) return; new FileReader().onload = ev => document.getElementById('jsonTa').value = ev.target.result; });

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('editOverlay').classList.contains('open')) tryCloseModal();
    else if (document.getElementById('jsonOverlay').classList.contains('open')) closeJson();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveProj();
});

// ─── INIT ─────────────────────────────────────────────────
loadData();
</script>
